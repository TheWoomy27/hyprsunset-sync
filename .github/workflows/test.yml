name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Check Python syntax
        run: python -m py_compile src/hyprsunset_sync.py
      - name: Check shell syntax
        run: bash -n install.sh install-quickshell.sh uninstall.sh
